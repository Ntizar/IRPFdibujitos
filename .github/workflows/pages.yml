name: Build & Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r python/requirements.txt

      - name: Generate JSON data
        run: python python/generar_datos.py

      - name: Run tests
        run: pytest python -q

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r web/* _site/
          mkdir -p _site/data
          cp data/*.json _site/data/
          cp -r docs _site/docs
          cp README.md _site/README.md

      - name: Patch DATA_BASE for Pages
        run: |
          sed -i 's|const DATA_BASE = "../data";|const DATA_BASE = "data";|' _site/app.js

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
